<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C to Flowchart</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Fira+Code&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="styles.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/raphael/2.3.0/raphael.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/flowchart/1.15.0/flowchart.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/esprima/dist/esprima.min.js"></script>
</head>
<body>

<header>
  <h1>C to Flowchart</h1>
  <p>Convert C Code to Flowchart</p>
</header>

<main class="container">

  <div class="editor-section">
    <span class="section-title">C Code</span>
    <div id="editor"></div>
  </div>
  <br><br>

  <button onclick="generateFlowchart()">Generate Flowchart</button>
  <br><br>

  <div class="flowchart-section">
    <span class="section-title">Flowchart Output</span>
    <div id="output"></div>
  </div>
</main>

<script src="flow.js"></script>
</body>
</html>
